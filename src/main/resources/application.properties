spring.application.name=TemperatureLogger

server.port = 8088
server.address=0.0.0.0

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/templog}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Hibernate/JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Logg
logging.level.root=INFO
logging.level.staryhroft.templog=DEBUG
logging.level.org.springframework=INFO

# API
weather.api.key=${WEATHER_API_KEY}
weather.api.url=${WEATHER_API_URL}

#OPENWEATHER_API_KEY:test-key=db3e484e3fbcdb656a958afa1a3f3ffe

# Jackson
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

#Exceptions
spring.web.resources.add-mappings=false