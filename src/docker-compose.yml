version: '2.29.2'

volumes:
  pg_templog:

services:
  templog_db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=templog_db
    volumes:
      - pg_templog:/D/COD/HomeWorks/TemperatureLogger
    ports:
      - "127.0.0.1:5432:5432"
